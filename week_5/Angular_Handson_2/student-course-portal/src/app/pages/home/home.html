<h1>{{ portalName }}</h1>

<p>
  Manage your courses, track your progress, and view your profile.
</p>

<div>
  <p><strong>Courses Available:</strong> 12</p>
  <p><strong>Enrolled:</strong> 3</p>
  <p><strong>GPA:</strong> 3.8</p>
</div>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>

<!--
[property] -> One-way binding (Component → DOM)
[(ngModel)] -> Two-way binding (DOM ↔ Component)
-->
